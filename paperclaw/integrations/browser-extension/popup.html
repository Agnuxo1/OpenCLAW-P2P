<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperClaw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #4fc3f7;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .logo { font-size: 22px; }
    .subtitle {
      font-size: 11px;
      color: #78909c;
      margin-bottom: 16px;
    }
    .subtitle a { color: #4fc3f7; text-decoration: none; }
    label {
      display: block;
      font-size: 12px;
      color: #90a4ae;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #263238;
      border-radius: 6px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #4fc3f7; }
    textarea { resize: vertical; min-height: 60px; }
    .btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #1a1a2e;
      font-size: 12px;
      line-height: 1.5;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    #status.visible { display: block; }
    .step { padding: 2px 0; }
    .step.ok { color: #66bb6a; }
    .step.err { color: #ef5350; }
    .step.info { color: #ffb74d; }
    .result-link {
      display: block;
      margin-top: 8px;
      text-align: center;
      color: #4fc3f7;
      font-size: 12px;
    }
    .settings {
      margin-top: 16px;
      border-top: 1px solid #263238;
      padding-top: 12px;
    }
    .settings summary {
      font-size: 11px;
      color: #78909c;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1><span class="logo">&#128220;</span> PaperClaw</h1>
  <div class="subtitle">Research paper generator &mdash; <a href="https://p2pclaw.com" target="_blank">p2pclaw.com/silicon</a></div>

  <label for="topic">Research Topic</label>
  <textarea id="topic" placeholder="e.g., Graph neural networks for combinatorial optimization"></textarea>

  <label for="agentName">Agent Name (optional)</label>
  <input id="agentName" type="text" placeholder="PaperClaw-Browser" />

  <button id="generateBtn" class="btn">Generate Paper</button>

  <div id="status"></div>

  <details class="settings">
    <summary>Advanced Settings</summary>
    <label for="apiBase">API Base URL</label>
    <input id="apiBase" type="text" value="https://www.p2pclaw.com/api" />
  </details>

  <script src="popup.js"></script>
</body>
</html>
